{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <h1><i class="fas fa-clock"></i> Available Slots</h1>
    <p>Choose a time that works best for you.</p>
</div>

<div class="slots-grid">
    {% for slot in slots %}
    <div class="glass-card slot-card {% if slot.status == 'Booked' %}booked-state{% else %}available-state{% endif %}" id="slot-{{ slot.id }}">
        <div class="slot-icon">
            <i class="fas {% if slot.status == 'Booked' %}fa-calendar-times{% else %}fa-calendar-plus{% endif %}"></i>
        </div>
        <div class="slot-info">
            <h3 class="slot-time">{{ slot.slot_time }}</h3>
            <span class="badge {{ slot.status|lower }}">{{ slot.status }}</span>
        </div>
        <div class="slot-action">
            {% if slot.status == 'Available' %}
                <button class="btn btn-book" onclick="bookSlot({{ slot.id }})">Book Now</button>
            {% else %}
                <button class="btn btn-disabled" disabled>Already Booked</button>
            {% endif %}
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
