{% extends 'base.html' %}
{% block content %}
<div class="login-container">
    <div class="glass-card login-card">
        <h2><i class="fas fa-user-circle"></i> User Login</h2>
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        <p class="helper-text">New here? <a href="{% url 'register' %}">Create an account</a></p>
    </div>
</div>
{% endblock %}
